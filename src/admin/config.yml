backend:
  name: git-gateway
  branch: main

media_folder: "src/images/uploads"
public_folder: "/images/uploads"

collections:

  # ── Juridische pagina's ───────────────────────────────────
  - name: "paginas"
    label: "Pagina's"
    files:

      - label: "Privacybeleid"
        name: "privacy"
        file: "src/privacy.md"
        fields:
          - { label: "Paginatitel (SEO)", name: "title", widget: "string" }
          - { label: "Omschrijving (SEO)", name: "description", widget: "text" }
          - { label: "Hero titel", name: "hero_title", widget: "string" }
          - { label: "Hero ondertekst", name: "hero_subtitle", widget: "text" }
          - { label: "Inhoud", name: "body", widget: "markdown" }

      - label: "Algemene voorwaarden"
        name: "algemene-voorwaarden"
        file: "src/algemene-voorwaarden.md"
        fields:
          - { label: "Paginatitel (SEO)", name: "title", widget: "string" }
          - { label: "Omschrijving (SEO)", name: "description", widget: "text" }
          - { label: "Hero titel", name: "hero_title", widget: "string" }
          - { label: "Hero ondertekst", name: "hero_subtitle", widget: "text" }
          - { label: "Inhoud", name: "body", widget: "markdown" }

      - label: "Betalingsvoorwaarden"
        name: "betalingsvoorwaarden"
        file: "src/betalingsvoorwaarden.md"
        fields:
          - { label: "Paginatitel (SEO)", name: "title", widget: "string" }
          - { label: "Omschrijving (SEO)", name: "description", widget: "text" }
          - { label: "Hero titel", name: "hero_title", widget: "string" }
          - { label: "Hero ondertekst", name: "hero_subtitle", widget: "text" }
          - { label: "Inhoud", name: "body", widget: "markdown" }

      - label: "Veelgestelde vragen"
        name: "faq"
        file: "src/_data/faq.json"
        fields:
          - label: "Vragen"
            name: "items"
            widget: "list"
            fields:
              - { label: "Vraag", name: "question", widget: "string" }
              - { label: "Antwoord", name: "answer", widget: "markdown" }

      - label: "Tarieven 2026"
        name: "tarieven"
        file: "src/_data/tarieven.json"
        fields:
          - label: "Fysiotherapie"
            name: "fysiotherapie"
            widget: "list"
            fields:
              - { label: "Omschrijving", name: "omschrijving", widget: "string" }
              - { label: "Code", name: "code", widget: "string" }
              - { label: "Tarief (bijv. 49,95)", name: "tarief", widget: "string" }
              - { label: "Waarschuwingsrij (niet nagekomen afspraak)", name: "warning", widget: "boolean", default: false }
          - label: "FysioFitness"
            name: "fysiofitness"
            widget: "list"
            fields:
              - { label: "Omschrijving", name: "omschrijving", widget: "string" }
              - { label: "Periode (bijv. Per maand)", name: "periode", widget: "string" }
              - { label: "Tarief (bijv. 54,90)", name: "tarief", widget: "string" }
          - label: "Overig"
            name: "overig"
            widget: "list"
            fields:
              - { label: "Omschrijving", name: "omschrijving", widget: "string" }
              - { label: "Code", name: "code", widget: "string" }
              - { label: "Tarief (bijv. 108,00)", name: "tarief", widget: "string" }
          - label: "Orthomoleculair"
            name: "orthomoleculair"
            widget: "list"
            fields:
              - { label: "Omschrijving", name: "omschrijving", widget: "string" }
              - { label: "Code", name: "code", widget: "string" }
              - { label: "Tarief (bijv. 56,00)", name: "tarief", widget: "string" }

  # ── Blog ──────────────────────────────────────────────────
  - name: "blog"
    label: "Blog artikelen"
    folder: "src/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Datum", name: "date", widget: "datetime" }
      - label: "Categorie"
        name: "category"
        widget: "select"
        options: ["Artrose", "Herstel", "Leefstijl", "Pijn", "Sport", "Voeding", "Algemeen"]
      - { label: "Samenvatting", name: "excerpt", widget: "text" }
      - { label: "Uitgelichte afbeelding", name: "thumbnail", widget: "image", required: false }
      - { label: "Inhoud", name: "body", widget: "markdown" }
      - { label: "Gepubliceerd", name: "published", widget: "boolean", default: true }

  # ── Behandelingen (diensten) ──────────────────────────────
  - name: "diensten"
    label: "Behandelingen"
    folder: "src/onze-diensten"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Samenvatting (voor Google)", name: "excerpt", widget: "text" }
      - label: "Categorie"
        name: "category"
        widget: "select"
        options: ["Behandelingen"]
        default: "Behandelingen"
      - { label: "Inhoud", name: "body", widget: "markdown" }

  # ── Pagina instellingen ───────────────────────────────────
  - name: "settings"
    label: "Website instellingen"
    files:

      - label: "Praktijk info"
        name: "general"
        file: "src/_data/general.json"
        fields:
          - { label: "Praktijknaam", name: "name", widget: "string" }
          - { label: "Telefoonnummer", name: "phone", widget: "string" }
          - { label: "WhatsApp nummer (met landcode, zonder +)", name: "whatsapp", widget: "string" }
          - { label: "E-mailadres", name: "email", widget: "string" }
          - { label: "Adres (volledig, voor display)", name: "address", widget: "string" }
          - { label: "Straat + nummer (voor schema)", name: "address_street", widget: "string", required: false }
          - { label: "Postcode (voor schema)", name: "address_postal", widget: "string", required: false }
          - { label: "Plaats (voor schema)", name: "address_city", widget: "string", required: false }
          - { label: "Land (NL/BE/DE)", name: "address_country", widget: "string", default: "NL", required: false }
          - { label: "Gemiddelde beoordeling", name: "review_score", widget: "string" }
          - { label: "Aantal beoordelingen", name: "review_count", widget: "number" }
          - { label: "── SEO & vindbaarheid ──", name: "_sep_seo", widget: "hidden", required: false }
          - { label: "Productie-URL (bijv. https://fysiopraktijkzeist.nl)", name: "site_url", widget: "string", hint: "Wordt gebruikt voor canonical URLs en sitemap" }
          - { label: "Site tagline (voor delen)", name: "site_tagline", widget: "string", required: false }
          - { label: "Standaard meta-omschrijving (fallback)", name: "default_description", widget: "text", required: false, hint: "Gebruikt als een pagina geen eigen beschrijving heeft" }
          - { label: "Oprichtingsjaar", name: "founding_year", widget: "string", required: false }
          - { label: "KvK-nummer", name: "kvk", widget: "string", required: false }
          - { label: "BIG-nummer eigenaar", name: "big_owner", widget: "string", required: false }
          - { label: "Latitude (Google Maps)", name: "latitude", widget: "string", required: false, hint: "Bijv. 52.0907 — vind via maps.google.com → rechtermuisknop op locatie" }
          - { label: "Longitude (Google Maps)", name: "longitude", widget: "string", required: false, hint: "Bijv. 5.2498" }
          - { label: "Prijsindicatie (€, €€, €€€)", name: "price_range", widget: "string", default: "€€", required: false }
          - { label: "Deel-afbeelding (1200×630, voor WhatsApp/Facebook)", name: "og_image", widget: "image", required: false, hint: "Banner met praktijk + tagline. Wordt getoond als iemand de site deelt." }
          - { label: "Logo (PNG met transparantie, voor schema)", name: "logo_url", widget: "image", required: false }
          - { label: "Facebook URL", name: "facebook_url", widget: "string", required: false }
          - { label: "Instagram URL", name: "instagram_url", widget: "string", required: false }
          - { label: "LinkedIn URL", name: "linkedin_url", widget: "string", required: false }
          - { label: "ZorgkaartNederland profiel-URL", name: "zorgkaart_url", widget: "string", required: false }
          - { label: "Google Business profiel-URL", name: "google_business_url", widget: "string", required: false }
          - label: "Werkgebied (plaatsen)"
            name: "service_areas"
            widget: "list"
            required: false
            field: { label: "Plaatsnaam", name: "place", widget: "string" }
            hint: "Plaatsen waar u patiënten vandaan ontvangt — versterkt lokale SEO"

      - label: "Hero sectie"
        name: "hero"
        file: "src/_data/hero.json"
        fields:
          - { label: "Hoofdtekst regel 1", name: "title_1", widget: "string" }
          - { label: "Hoofdtekst regel 2 (cursief)", name: "title_2", widget: "string" }
          - { label: "Hoofdtekst regel 3", name: "title_3", widget: "string" }
          - { label: "Subtekst", name: "subtitle", widget: "text" }
          - { label: "Badge tekst", name: "badge", widget: "string" }

      - label: "Beschikbaarheid badge (hero)"
        name: "urgency"
        file: "src/_data/urgency.json"
        fields:
          - label: "Beschikbaarheid"
            name: "text"
            widget: "select"
            options:
              - "🟢 Nieuwe patiënten welkom — geen verwijzing nodig"
              - "🟢 Deze week nog plek — plan direct uw afspraak"
              - "🟢 Vandaag en morgen nog plek — bel of app ons"
              - "🟠 Nog enkele plekken deze week — wacht niet te lang"
              - "🟠 Beperkt plek deze week — neem snel contact op"
              - "🔴 Bijna vol deze week — bel vandaag nog"
              - "🔴 Vol deze week — eerste plek volgende week beschikbaar"
            default: "🟢 Nieuwe patiënten welkom — geen verwijzing nodig"
            hint: "De kleur van de badge past zich automatisch aan op basis van uw keuze"

      - label: "Openingstijden"
        name: "hours"
        file: "src/_data/hours.json"
        fields:
          - { label: "Maandag", name: "monday", widget: "string" }
          - { label: "Dinsdag", name: "tuesday", widget: "string" }
          - { label: "Woensdag", name: "wednesday", widget: "string" }
          - { label: "Donderdag", name: "thursday", widget: "string" }
          - { label: "Vrijdag", name: "friday", widget: "string" }
          - { label: "Telefoon bereikbaar", name: "phone_hours", widget: "string" }

      - label: "Nieuwsticker (bovenbalk)"
        name: "ticker"
        file: "src/_data/ticker.json"
        fields:
          - { label: "Ticker tonen", name: "enabled", widget: "boolean", default: true, hint: "Zet uit om de ticker volledig te verbergen" }
          - { label: "Wisselsnelheid (seconden)", name: "interval_seconds", widget: "number", default: 5, min: 2, max: 30, value_type: "int" }
          - label: "Berichten"
            name: "items"
            widget: "list"
            summary: "{{fields.text}}"
            fields:
              - { label: "Bericht (begin met emoji indien gewenst)", name: "text", widget: "string", hint: "Bijv. 📢 Nieuwe valpreventie groep start in mei" }
              - { label: "Actief tonen", name: "active", widget: "boolean", default: true, hint: "Zet uit om dit bericht te bewaren maar niet te tonen" }

      - label: "Team"
        name: "team"
        file: "src/_data/team.json"
        fields:
          - label: "Teamleden"
            name: "members"
            widget: "list"
            fields:
              - { label: "Naam", name: "name", widget: "string" }
              - { label: "Initialen", name: "initials", widget: "string" }
              - { label: "Specialisatie", name: "specialty", widget: "string" }
              - { label: "Foto", name: "photo", widget: "image", required: false }

      - label: "Diensten"
        name: "services"
        file: "src/_data/services.json"
        fields:
          - label: "Behandelingen"
            name: "items"
            widget: "list"
            fields:
              - { label: "Naam", name: "name", widget: "string" }
              - { label: "Icoon (emoji)", name: "icon", widget: "string" }
              - { label: "Omschrijving", name: "description", widget: "text" }
              - { label: "URL", name: "url", widget: "string" }

      - label: "Klachten (Herkent u dit?)"
        name: "complaints"
        file: "src/_data/complaints.json"
        fields:
          - label: "Klachten"
            name: "items"
            widget: "list"
            fields:
              - { label: "Naam", name: "name", widget: "string" }
              - { label: "Icoon (emoji)", name: "icon", widget: "string" }
              - { label: "Omschrijving", name: "description", widget: "string" }

      - label: "USP's (Wat ons onderscheidt)"
        name: "usps"
        file: "src/_data/usps.json"
        fields:
          - label: "USP's"
            name: "items"
            widget: "list"
            fields:
              - { label: "Titel", name: "title", widget: "string" }
              - { label: "Icoon (emoji)", name: "icon", widget: "string" }
              - { label: "Omschrijving", name: "description", widget: "text" }

      - label: "Beoordelingen"
        name: "reviews"
        file: "src/_data/reviews.json"
        fields:
          - label: "Reviews"
            name: "items"
            widget: "list"
            fields:
              - { label: "Citaat", name: "quote", widget: "text" }
              - { label: "Naam patiënt (of 'Patiënt')", name: "name", widget: "string" }
              - { label: "Bron", name: "source", widget: "string", default: "via ZorgkaartNederland" }

      - label: "Trust bar"
        name: "trust"
        file: "src/_data/trust.json"
        fields:
          - label: "Items"
            name: "items"
            widget: "list"
            fields:
              - { label: "Tekst", name: "text", widget: "string" }

      - label: "Shop — FysioFitness abonnementen"
        name: "shop_fitness"
        file: "src/_data/shop.json"
        fields:
          - label: "FysioFitness"
            name: "fitness"
            widget: "object"
            fields:
              - { label: "Sectietitel", name: "title", widget: "string" }
              - { label: "Intro tekst", name: "intro", widget: "text" }
              - label: "Producten"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Naam (bijv. 1× per week)", name: "name", widget: "string" }
                  - { label: "Periode (bijv. per maand)", name: "period", widget: "string" }
                  - { label: "Prijs (alleen cijfers)", name: "price", widget: "string" }
                  - { label: "Prijstoelichting", name: "price_note", widget: "string" }
                  - label: "Kenmerken"
                    name: "features"
                    widget: "list"
                    field: { label: "Kenmerk", name: "item", widget: "string" }
                  - { label: "Uitgelicht (meest gekozen)", name: "highlight", widget: "boolean", default: false }
                  - { label: "Mollie betaallink (leeg = telefonisch aanmelden)", name: "mollie_url", widget: "string", required: false }
          - label: "Strippenkaarten"
            name: "strippenkaarten"
            widget: "object"
            fields:
              - { label: "Sectietitel", name: "title", widget: "string" }
              - { label: "Intro tekst", name: "intro", widget: "text" }
              - label: "Producten"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Naam (bijv. 5 behandelingen)", name: "name", widget: "string" }
                  - { label: "Prijs (alleen cijfers)", name: "price", widget: "string" }
                  - { label: "Prijstoelichting", name: "price_note", widget: "string" }
                  - label: "Kenmerken"
                    name: "features"
                    widget: "list"
                    field: { label: "Kenmerk", name: "item", widget: "string" }
                  - { label: "Uitgelicht (meest gekozen)", name: "highlight", widget: "boolean", default: false }
                  - { label: "Mollie betaallink (leeg = telefonisch aanmelden)", name: "mollie_url", widget: "string", required: false }
